# Google Earth Engine Settings
# project_id is loaded from GEE_PROJECT_ID in .env file
gee:
  satellite_dataset: "GOOGLE/Research/open-buildings/v3/polygons"
  embedding_asset: "GOOGLE/Research/open-buildings-embeddings/v1"
  scale: 10  # meters per pixel
  max_pixels: 1e9

# Processing Settings
# These values can be overridden by BATCH_SIZE and MAX_WORKERS in .env file
processing:
  batch_size: 50  # Number of municipalities per batch (optimized for free tier)
  max_workers: 2  # Number of parallel workers (optimized for free tier)
  retry_attempts: 3
  retry_delay: 5  # seconds
  chunk_size: 10  # Write to disk every N records (memory optimization)
  
# Memory Management
memory:
  max_memory_mb: 1000  # Maximum memory usage in MB
  gc_interval: 50  # Force garbage collection every N records
  monitor_enabled: true  # Enable memory monitoring
  log_interval: 25  # Log memory usage every N records

# Export Settings
# drive_folder is loaded from GDRIVE_FOLDER_ID in .env file
export:
  file_format: "CSV"
  file_prefix: "municipality_embeddings"
  
# Region Settings
region:
  country: "Brazil"
  admin_level: "municipality"
  boundary_source: "IBGE"  # Instituto Brasileiro de Geografia e Estatística
